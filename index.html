<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UWorld Notes</title>
<style>
  :root[data-theme="dark"]{
    --bg:#0f0f0f;
    --bg-sidebar:#121212;
    --bg-card:#1a1a1a;
    --bg-card-hover:#222222;
    --bg-modal:#171717;
    --text:#e9eaed;
    --text-dim:#9aa0aa;
    --text-faint:#6b7280;
    --border:#272727;
    --accent:#e3a23c;
    --accent-text:#1a1406;
    --danger:#e2615a;
    --danger-bg:rgba(226,97,90,0.12);
    --shadow:0 8px 24px rgba(0,0,0,0.55);
    --overlay:rgba(0,0,0,0.7);
  }
  :root[data-theme="light"]{
    --bg:#faf8f3;
    --bg-sidebar:#f1ece1;
    --bg-card:#ffffff;
    --bg-card-hover:#fbf6ec;
    --bg-modal:#ffffff;
    --text:#2b2924;
    --text-dim:#736b5c;
    --text-faint:#a89e8c;
    --border:#e6ddc9;
    --accent:#c4791c;
    --accent-text:#fff8ec;
    --danger:#c0392b;
    --danger-bg:rgba(192,57,43,0.08);
    --shadow:0 8px 24px rgba(60,45,20,0.12);
    --overlay:rgba(40,30,15,0.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Segoe UI","Tahoma","Geneva",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
    position:relative;
    transition:background .2s ease,color .2s ease;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:
      radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 20%),
        rgba(227,162,60,.16),
        transparent 45%),
      radial-gradient(420px circle at calc(var(--mouse-x, 50%) + 220px) calc(var(--mouse-y, 20%) + 140px),
        rgba(95,168,211,.10),
        transparent 40%);
    filter:blur(12px);
    opacity:.95;
    transition:background-position .08s linear;
  }
  #app{display:flex;height:100vh;position:relative;z-index:1;}

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:270px;
    flex-shrink:0;
    background:var(--bg-sidebar);
    border-left:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:16px 14px;
    overflow-y:auto;
  }
  .brand{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:4px;
  }
  .brand-title{
    font-size:19px;font-weight:800;letter-spacing:.2px;
    display:flex;align-items:center;gap:8px;
  }
  .brand-dot{
    width:10px;height:10px;border-radius:3px;background:var(--accent);
    transform:rotate(45deg);flex-shrink:0;
  }
  .brand-actions{display:flex;gap:6px;}
  .shared-badge{
    font-size:11px;color:var(--text-faint);background:var(--bg);
    border:1px solid var(--border);border-radius:20px;padding:5px 10px;
    margin-bottom:16px;line-height:1.6;
  }
  .icon-btn{
    background:transparent;border:1px solid var(--border);color:var(--text-dim);
    width:34px;height:34px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;transition:.15s;
  }
  .icon-btn:hover{background:var(--bg-card-hover);color:var(--text);}

  .sidebar-section-label{
    font-size:11px;color:var(--text-faint);font-weight:700;
    text-transform:uppercase;letter-spacing:.06em;margin:10px 4px 8px;
  }
  #folder-list{display:flex;flex-direction:column;gap:4px;flex:1;}
  .folder-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:10px;cursor:pointer;
    color:var(--text-dim);position:relative;
    border:1px solid transparent;
  }
  .folder-item:hover{background:var(--bg-card-hover);color:var(--text);}
  .folder-item.active{
    background:var(--bg-card);color:var(--text);border-color:var(--border);
    font-weight:700;
  }
  .folder-avatar{
    width:28px;height:28px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;color:#fff;
    background-size:cover;background-position:center;overflow:hidden;
  }
  .folder-edit{
    opacity:0;width:24px;height:24px;border-radius:6px;border:none;background:transparent;
    color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:13px;
  }
  .folder-item:hover .folder-edit{opacity:1;}
  .folder-edit:hover{background:var(--bg-card-hover);color:var(--text);}
  .folder-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14.5px;}
  .folder-count{
    font-size:11.5px;color:var(--text-faint);background:var(--bg);
    border:1px solid var(--border);border-radius:20px;padding:2px 8px;flex-shrink:0;
  }
  .folder-item.active .folder-count{color:var(--text-dim);}
  .folder-del{
    opacity:0;width:24px;height:24px;border-radius:6px;border:none;background:transparent;
    color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:14px;
  }
  .folder-item:hover .folder-del{opacity:1;}
  .folder-del:hover{background:var(--danger-bg);color:var(--danger);}

  #add-folder-wrap{margin-top:10px;}
  .add-folder-btn{
    width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--border);
    background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .add-folder-btn:hover{border-color:var(--accent);color:var(--accent);}
  .add-folder-form{display:flex;gap:6px;}
  .add-folder-form input{
    flex:1;padding:9px 11px;border-radius:9px;border:1.5px solid var(--accent);
    background:var(--bg-card);color:var(--text);font-size:14px;outline:none;
    font-family:inherit;
  }
  .add-folder-form button{
    background:var(--accent);color:var(--accent-text);border:none;border-radius:9px;
    padding:0 13px;font-weight:700;cursor:pointer;font-size:14px;
  }

  /* ---------- Main ---------- */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  #main-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px;border-bottom:1px solid var(--border);flex-shrink:0;gap:14px;
  }
  #header-left{display:flex;align-items:center;gap:12px;min-width:0;}
  #hamburger{display:none;}
  #folder-title{font-size:20px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #folder-sub{font-size:12.5px;color:var(--text-faint);font-weight:500;}
  #header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  #search-input{
    width:min(340px, 36vw);
    min-width:180px;
    padding:10px 13px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-card);
    color:var(--text);
    outline:none;
    font-family:inherit;
    font-size:14px;
    transition:.15s;
  }
  #search-input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(227,162,60,.12);
  }
  #search-input::placeholder{color:var(--text-faint);}
  .btn-primary{
    background:var(--accent);color:var(--accent-text);border:none;border-radius:10px;
    padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;display:flex;
    align-items:center;gap:6px;flex-shrink:0;transition:.15s;
  }
  .btn-primary:hover{filter:brightness(1.07);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}

  #notes-scroll{flex:1;overflow-y:auto;padding:22px 26px 40px;}
  #notes-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:16px;
  }
  .note-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
    padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:10px;
    transition:.15s;min-height:120px;
    animation:fadeUp .35s ease both;
  }
  .note-card:hover{background:var(--bg-card-hover);transform:translateY(-1px);box-shadow:var(--shadow);}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  .note-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .note-badge{
    width:34px;height:34px;border-radius:50%;border:2px solid var(--accent);
    color:var(--accent);font-weight:800;font-size:14px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .note-title{font-size:15.5px;font-weight:700;line-height:1.4;flex:1;}
  .note-preview{
    font-size:13px;color:var(--text-dim);line-height:1.6;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    white-space:pre-wrap;
  }
  .note-imgs{display:flex;gap:6px;margin-top:auto;}
  .note-imgs img{
    width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--border);
  }
  .note-imgs .more-badge{
    width:42px;height:42px;border-radius:8px;border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:12px;
    color:var(--text-faint);background:var(--bg);
  }
  .note-date{font-size:11px;color:var(--text-faint);}

  .welcome-banner{
    margin:18px 26px 0;
    padding:18px 20px;
    border:1px solid var(--border);
    border-radius:18px;
    background:linear-gradient(135deg, rgba(227,162,60,.10), rgba(95,168,211,.05));
    box-shadow:var(--shadow);
  }
  .welcome-banner h2{
    margin:0 0 6px;
    font-size:22px;
    line-height:1.4;
  }
  .welcome-banner p{
    margin:0;
    color:var(--text-dim);
    line-height:1.8;
    font-size:14px;
  }

  /* ---------- Empty states ---------- */
  .empty-state{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--text-dim);gap:10px;padding:40px;
  }
  .empty-state .big{font-size:42px;}
  .empty-state h3{margin:0;font-size:17px;color:var(--text);}
  .empty-state p{margin:0;font-size:14px;max-width:320px;line-height:1.7;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:var(--bg-modal);border-radius:16px;border:1px solid var(--border);
    width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column;
    box-shadow:var(--shadow);
  }
  .modal-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .modal-header h3{margin:0;font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .modal-body{padding:18px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}
  .modal-footer{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;gap:10px;
  }
  .field-label{font-size:12.5px;font-weight:700;color:var(--text-dim);margin-bottom:6px;display:block;}
  input.text-input, textarea.text-input{
    width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;
    resize:vertical;
  }
  input.text-input:focus, textarea.text-input:focus{border-color:var(--accent);}
  textarea.text-input{min-height:150px;line-height:1.7;}
  .btn-ghost{
    background:transparent;border:1.5px solid var(--border);color:var(--text-dim);
    border-radius:10px;padding:9px 15px;font-weight:700;font-size:14px;cursor:pointer;
  }
  .btn-ghost:hover{background:var(--bg-card-hover);color:var(--text);}
  .btn-danger-ghost{
    background:transparent;border:1.5px solid var(--danger);color:var(--danger);
    border-radius:10px;padding:9px 15px;font-weight:700;font-size:13.5px;cursor:pointer;
  }
  .btn-danger-ghost:hover{background:var(--danger-bg);}
  .footer-right{display:flex;gap:8px;}

  .img-upload-btn{
    border:1.5px dashed var(--border);border-radius:10px;padding:10px 14px;
    color:var(--text-dim);cursor:pointer;font-size:13.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;
  }
  .img-upload-btn:hover{border-color:var(--accent);color:var(--accent);}
  #img-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .img-preview{
    position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;
    border:1px solid var(--border);
  }
  .img-preview img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;}
  .img-remove{
    position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,0.65);color:#fff;border:none;font-size:11px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }

  /* note view (read-only) */
  .view-content{
    font-size:15px;line-height:1.8;color:var(--text);
    white-space:pre-wrap;word-break:break-word;
  }
  .view-imgs{display:flex;flex-direction:column;gap:10px;}
  .view-img{
    width:100%;height:auto;max-width:100%;
    border-radius:10px;border:1px solid var(--border);
    cursor:zoom-in;display:block;background:var(--bg);
  }

  /* lightbox */
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:80;
    display:flex;align-items:center;justify-content:center;padding:30px;cursor:zoom-out;
  }
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--bg-card);border:1px solid var(--border);color:var(--text);
    padding:10px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);
    z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1;}

  /* mobile */
  @media (max-width:760px){
    #sidebar{
      position:fixed;inset:0 25% 0 auto;z-index:40;width:78%;max-width:300px;
      transform:translateX(105%);transition:transform .22s ease;box-shadow:var(--shadow);
    }
    html[dir="rtl"] #sidebar{transform:translateX(-105%);}
    body.sidebar-open #sidebar{transform:translateX(0);}
    #backdrop{
      position:fixed;inset:0;background:var(--overlay);z-index:35;display:none;
    }
    body.sidebar-open #backdrop{display:block;}
    #hamburger{display:flex;}
    #notes-grid{grid-template-columns:1fr;}
    #main-header{padding:14px 16px;flex-wrap:wrap;}
    #header-left{width:100%;}
    #header-right{width:100%;justify-content:space-between;}
    #search-input{width:100%;min-width:0;order:3;}
    #notes-scroll{padding:16px 16px 40px;}
    .welcome-banner{margin:14px 16px 0;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="backdrop" onclick="closeSidebarMobile()"></div>

  <aside id="sidebar">
    <div class="brand">
      <div class="brand-title"><span class="brand-dot"></span> UWorld Notes</div>
      <div class="brand-actions">
        <button class="icon-btn" id="refresh-folders-btn" title="تحديث">🔄</button>
        <button class="icon-btn" id="theme-toggle" title="تبديل المظهر">🌙</button>
      </div>
    </div>
    <div class="shared-badge">📚 موقع عباد الرحمن لنوتس الامتحان</div>
    <div class="shared-badge" id="conn-status" style="margin-top:6px;display:none;">Connecting to database...</div>

    <div class="sidebar-section-label">المجلدات</div>
    <div id="folder-list"></div>

    <div id="add-folder-wrap"></div>
  </aside>

  <main id="main">
    <div id="main-header">
      <div id="header-left">
        <button class="icon-btn" id="hamburger" onclick="openSidebarMobile()">☰</button>
        <div>
          <div id="folder-title">اختار مجلد</div>
          <div id="folder-sub"></div>
        </div>
      </div>
      <div id="header-right">
        <input type="search" id="search-input" placeholder="ابحث بالاسم أو المحتوى">
        <button class="icon-btn" id="refresh-notes-btn" title="تحديث النوتس">🔄</button>
        <button class="btn-primary" id="new-note-btn" onclick="openNoteEditModal()" disabled>＋ نوت جديدة</button>
      </div>
    </div>
    <div class="welcome-banner" id="welcome-banner">
      <h2>👋 أهلاً بيك في UWorld Notes</h2>
      <p>اكتب نوتسك، نظمها داخل مجلدات، وابحث فيها بسرعة من أي مكان داخل الموقع.</p>
    </div>
    <div id="notes-scroll">
      <div id="notes-grid"></div>
    </div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<script>
let connOk = null;
function setConnStatus(ok){
  if(connOk === ok) return;
  connOk = ok;
  const el = document.getElementById('conn-status');
  if(el){
    if(ok){ el.style.display = 'none'; } 
    else {
      el.style.display = '';
      el.textContent = 'Offline — notes are not syncing right now';
      el.style.color = 'var(--danger)';
    }
  }
  if(!ok){ showToast('تعذر الاتصال بقاعدة البيانات المشتركة (Firebase). راجع الإنترنت.'); }
}
async function sGet(key, shared){
  if(window.storage){
    try{
      const r = await window.storage.get(key, shared);
      if(shared) setConnStatus(true);
      return r ? JSON.parse(r.value) : null;
    }catch(e){
      console.error('[storage:get]', key, e);
      if(shared){ setConnStatus(false); return null; }
    }
  }
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function sSet(key, value, shared, silent){
  if(window.storage){
    try{
      await window.storage.set(key, JSON.stringify(value), shared);
      if(shared) setConnStatus(true);
      return true;
    }catch(e){
      if(!silent) console.error('[storage:set]', key, e);
      if(shared){ setConnStatus(false); return false; }
    }
  }
  try{ localStorage.setItem(key, JSON.stringify(value)); return true; }catch(e){ return false; }
}
async function sDelete(key, shared){
  if(window.storage){
    try{
      await window.storage.delete(key, shared);
      if(shared) setConnStatus(true);
      return;
    }catch(e){
      console.error('[storage:delete]', key, e);
      if(shared){ setConnStatus(false); return; }
    }
  }
  try{ localStorage.removeItem(key); }catch(e){}
}

let folders = [];
let notesByFolder = {};
let currentFolderId = null;
let theme = 'dark';
let editingNote = null;
let pendingImages = [];
let addFolderOpen = false;
let searchQuery = '';

const PALETTE = ['#e3a23c','#5fa8d3','#7fb069','#c97f9b','#9b7fd4','#d97c5c','#5fb3a3','#c4a35a'];

function colorForFolder(id){
  let h = 0;
  for(const ch of id) h = (h*31 + ch.charCodeAt(0)) % 997;
  return PALETTE[h % PALETTE.length];
}
function uid(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('ar-EG', {day:'numeric', month:'short', year:'numeric'});
}
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

async function init(){
  const savedTheme = await sGet('app:theme', false);
  theme = savedTheme || 'dark';
  applyTheme();
  setupBackgroundMotion();
  setupSearch();
  await refreshFolders();
  await preloadAllCounts();
  renderSidebar();
  renderMain();
  await maybeOfferMigration();
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
}

function setupBackgroundMotion(){
  let raf = null;
  let x = window.innerWidth * 0.5;
  let y = window.innerHeight * 0.2;
  const apply = ()=>{
    document.body.style.setProperty('--mouse-x', x + 'px');
    document.body.style.setProperty('--mouse-y', y + 'px');
    raf = null;
  };
  document.addEventListener('mousemove', (e)=>{
    x = e.clientX;
    y = e.clientY;
    if(raf) return;
    raf = requestAnimationFrame(apply);
  }, {passive:true});
  apply();
}

function setupSearch(){
  const input = document.getElementById('search-input');
  if(!input) return;
  input.addEventListener('input', ()=>{
    searchQuery = input.value.trim().toLowerCase();
    renderMain();
  });
  input.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){
      input.value = ''; searchQuery = ''; renderMain(); input.blur();
    }
  });
}

async function refreshFolders(){
  const data = await sGet('app:folders', true);
  folders = data || [];
}
async function preloadAllCounts(){
  await Promise.all(folders.map(async folder=>{
    const data = await sGet('app:notes:' + folder.id, true);
    notesByFolder[folder.id] = data || [];
  }));
}
async function loadNotesForFolder(folderId, force){
  if(notesByFolder[folderId] && !force) return;
  const data = await sGet('app:notes:' + folderId, true);
  notesByFolder[folderId] = data || [];
}

async function maybeOfferMigration(){
  let localFolders = [];
  try{ localFolders = JSON.parse(localStorage.getItem('app:folders') || 'null') || []; }catch(e){}
  if(!localFolders.length || folders.length) return;
  showModal(`
    <div class="modal-header"><h3>📦 نقل النوتس المحفوظة على جهازك</h3></div>
    <div class="modal-body">
      <div class="confirm-text">لاقينا ${localFolders.length} مجلد محفوظين على المتصفح ده. تحب ننقلهم للموقع المشترك؟</div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="skip-migrate">تجاهل</button>
      <button class="btn-primary" id="confirm-migrate">نقل النوتس</button>
    </div>
  `);
  document.getElementById('skip-migrate').onclick = closeModal;
  document.getElementById('confirm-migrate').onclick = async ()=>{
    closeModal();
    await migrateLocalToShared(localFolders);
  };
}
async function migrateLocalToShared(localFolders){
  showToast('بننقل النوتس...');
  const ok = await sSet('app:folders', localFolders, true);
  if(!ok){ showToast('فشل النقل — مفيش اتصال بقاعدة البيانات'); return; }
  for(const f of localFolders){
    let localNotes = [];
    try{ localNotes = JSON.parse(localStorage.getItem('app:notes:' + f.id) || 'null') || []; }catch(e){}
    if(localNotes.length) await sSet('app:notes:' + f.id, localNotes, true);
  }
  await refreshFolders();
  if(folders.length){ currentFolderId = folders[0].id; await loadNotesForFolder(currentFolderId, true); }
  renderSidebar(); renderMain(); showToast('تم نقل النوتس بنجاح ✅');
}

function renderSidebar(){
  const list = document.getElementById('folder-list');
  list.innerHTML = '';
  if(folders.length === 0){
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:13px;color:var(--text-faint);padding:8px 4px;line-height:1.7;';
    hint.textContent = 'لسه مفيش مجلدات. اعمل أول مجلد جديد.';
    list.appendChild(hint);
  }
  folders.forEach(f=>{
    const count = Array.isArray(notesByFolder[f.id]) ? notesByFolder[f.id].length : 0;
    const item = document.createElement('div');
    item.className = 'folder-item' + (f.id===currentFolderId ? ' active':'');
    item.innerHTML = `
      <div class="folder-avatar" style="${f.image ? `background-image:url('${f.image}')` : `background:${f.color}`}">${f.image ? '' : escapeHtml(f.name.trim()[0] || '#')}</div>
      <div class="folder-name">${escapeHtml(f.name)}</div>
      <div class="folder-count">${count}</div>
      <button class="folder-edit" title="تعديل">✏️</button>
      <button class="folder-del" title="حذف">🗑️</button>
    `;
    item.addEventListener('click', (e)=>{
      if(e.target.closest('.folder-del') || e.target.closest('.folder-edit')) return;
      selectFolder(f.id);
    });
    item.querySelector('.folder-edit').addEventListener('click', (e)=>{ e.stopPropagation(); openEditFolderModal(f); });
    item.querySelector('.folder-del').addEventListener('click', (e)=>{ e.stopPropagation(); confirmDeleteFolder(f); });
    list.appendChild(item);
  });

  const addWrap = document.getElementById('add-folder-wrap');
  if(addFolderOpen){
    addWrap.innerHTML = `
      <form class="add-folder-form" id="add-folder-form">
        <input type="text" id="new-folder-input" placeholder="اسم المجلد الجديد" maxlength="40" autocomplete="off">
        <button type="submit">إضافة</button>
      </form>
    `;
    const input = document.getElementById('new-folder-input');
    setTimeout(()=>input.focus(), 0);
    document.getElementById('add-folder-form').addEventListener('submit', (e)=>{
      e.preventDefault(); const name = input.value.trim(); addFolderOpen = false;
      if(name) addFolder(name); else renderSidebar();
    });
  } else {
    addWrap.innerHTML = `<button class="add-folder-btn" id="open-add-folder">＋ مجلد جديد</button>`;
    document.getElementById('open-add-folder').addEventListener('click', ()=>{ addFolderOpen = true; renderSidebar(); });
  }
}

async function addFolder(name){
  const fresh = await sGet('app:folders', true) || [];
  const f = { id: uid('f'), name, color: '', createdAt: Date.now() };
  f.color = colorForFolder(f.id); fresh.push(f); folders = fresh;
  notesByFolder[f.id] = []; await sSet('app:folders', folders, true); await selectFolder(f.id);
}

function openEditFolderModal(folder){
  let pendingFolderImage = folder.image || null;
  showModal(`
    <div class="modal-header"><h3>✏️ تعديل المجلد</h3><button class="icon-btn" id="close-edit-folder-modal">✕</button></div>
    <div class="modal-body">
      <div><label class="field-label">اسم المجلد</label><input type="text" class="text-input" id="edit-folder-name" maxlength="40" value="${escapeHtml(folder.name)}"></div>
      <div>
        <label class="field-label">شعار المجلد</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="folder-avatar" id="edit-folder-avatar-preview" style="width:48px;height:48px;font-size:18px;${pendingFolderImage ? `background-image:url('${pendingFolderImage}')` : `background:${folder.color}`}">${pendingFolderImage ? '' : escapeHtml(folder.name.trim()[0] || '#')}</div>
          <label class="img-upload-btn">🖼️ تغيير الصورة<input type="file" accept="image/*" id="edit-folder-img-input" style="display:none"></label>
          ${pendingFolderImage ? '<button class="btn-ghost" id="remove-folder-img-btn">إزالة الصورة</button>' : ''}
        </div>
      </div>
    </div>
    <div class="modal-footer"><div></div><div class="footer-right"><button class="btn-ghost" id="cancel-edit-folder">إلغاء</button><button class="btn-primary" id="save-edit-folder">حفظ</button></div></div>
  `);
  document.getElementById('close-edit-folder-modal').onclick = closeModal;
  document.getElementById('cancel-edit-folder').onclick = closeModal;
  document.getElementById('edit-folder-img-input').addEventListener('change', async (e)=>{
    const file = e.target.files && e.target.files[0]; if(!file) return;
    try{
      showToast('جاري رفع صورة المجلد...');
      pendingFolderImage = await window.uploadFileToStorage(file);
      openEditFolderModal({ ...folder, image: pendingFolderImage });
    }catch(err){ showToast('فشل رفع الصورة'); }
  });
  if(document.getElementById('remove-folder-img-btn')){ document.getElementById('remove-folder-img-btn').onclick = ()=>{ openEditFolderModal({ ...folder, image: null }); }; }
  document.getElementById('save-edit-folder').onclick = async ()=>{
    const name = document.getElementById('edit-folder-name').value.trim(); if(!name){ showToast('اكتب اسم للمجلد'); return; }
    const fresh = await sGet('app:folders', true) || []; const idx = fresh.findIndex(x=>x.id===folder.id);
    if(idx > -1){ fresh[idx] = { ...fresh[idx], name, image: pendingFolderImage }; }
    folders = fresh; await sSet('app:folders', folders, true); closeModal(); renderSidebar(); renderMain(); showToast('تم تعديل المجلد');
  };
}

function confirmDeleteFolder(folder){
  const count = (notesByFolder[folder.id] || []).length;
  showModal(`
    <div class="modal-header"><h3>🗑 حذف "${escapeHtml(folder.name)}"</h3></div>
    <div class="modal-body"><div class="confirm-text">سيتم حذف المجلد نهائياً وكل النوتس التي بداخله (${count} نوت).</div></div>
    <div class="modal-footer"><button class="btn-ghost" id="cancel-del-folder">إلغاء</button><button class="btn-danger-ghost" id="confirm-del-folder">حذف نهائي</button></div>
  `);
  document.getElementById('cancel-del-folder').onclick = closeModal;
  document.getElementById('confirm-del-folder').onclick = async ()=>{ await deleteFolder(folder.id); closeModal(); };
}
async function deleteFolder(folderId){
  const fresh = await sGet('app:folders', true) || []; folders = fresh.filter(f=>f.id !== folderId);
  delete notesByFolder[folderId]; await sSet('app:folders', folders, true); await sDelete('app:notes:' + folderId, true);
  if(currentFolderId === folderId){ currentFolderId = folders.length ? folders[0].id : null; if(currentFolderId) await loadNotesForFolder(currentFolderId, true); }
  renderSidebar(); renderMain(); showToast('تم حذف المجلد');
}
async function selectFolder(folderId){ currentFolderId = folderId; await loadNotesForFolder(folderId, true); renderSidebar(); renderMain(); closeSidebarMobile(); }

function renderMain(){
  const titleEl = document.getElementById('folder-title'); const subEl = document.getElementById('folder-sub');
  const grid = document.getElementById('notes-grid'); const newBtn = document.getElementById('new-note-btn');
  const welcome = document.getElementById('welcome-banner'); grid.innerHTML = '';
  if(welcome) welcome.style.display = currentFolderId ? 'none' : 'block';
  if(!currentFolderId){
    titleEl.textContent = 'اختار مجلد'; subEl.textContent = ''; newBtn.disabled = true;
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">🗂️</div><h3>اختار أو اعمل مجلد الأول</h3><p>استخدم زرار مجلد جديد في الشريط الجانبي لبدء الكتابة.</p></div>`; return;
  }
  const folder = folders.find(f=>f.id===currentFolderId); const allNotes = notesByFolder[currentFolderId] || [];
  const notes = searchQuery ? allNotes.filter(n=> (n.title||'').toLowerCase().includes(searchQuery) || (n.content||'').toLowerCase().includes(searchQuery) ) : allNotes;
  titleEl.textContent = folder ? folder.name : ''; subEl.textContent = notes.length ? `${notes.length} نوت` : 'لسه مفيش نوتس'; newBtn.disabled = false;
  if(notes.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">🔎</div><h3>مفيش نوتس هنا</h3></div>`; return;
  }
  notes.forEach((note, idx)=>{
    const card = document.createElement('div'); card.className = 'note-card';
    const imgsHtml = (note.images && note.images.length) ? `<div class="note-imgs">${note.images.slice(0,3).map(im=>`<img src="${im.data}">`).join('')}${note.images.length>3 ? `<div class="more-badge">+${note.images.length-3}</div>`:''}</div>` : '';
    card.innerHTML = `<div class="note-top"><div class="note-badge">${idx+1}</div><div class="note-title">${escapeHtml(note.title) || 'بدون عنوان'}</div></div><div class="note-preview">${escapeHtml(note.content)}</div>${imgsHtml}<div class="note-date">${formatDate(note.createdAt)}</div>`;
    card.addEventListener('click', ()=>openNoteViewModal(note)); grid.appendChild(card);
  });
}

async function openNoteViewModal(note){
  await loadNotesForFolder(currentFolderId, true); renderMain();
  const fresh = (notesByFolder[currentFolderId] || []).find(n => n.id === note.id); if(!fresh){ showToast('النوت مش موجود'); return; } note = fresh;
  const folder = folders.find(f=>f.id===currentFolderId); const notes = notesByFolder[currentFolderId] || []; const noteNumber = notes.findIndex(n=>n.id===note.id)+1;
  const imgsHtml = (note.images && note.images.length) ? `<div class="view-imgs">${note.images.map(im=>`<img src="${im.data}" class="view-img" data-src="${im.data}">`).join('')}</div>` : '';
  showModal(`
    <div class="modal-header"><h3><span class="note-badge" style="width:28px;height:28px;font-size:12px;">${noteNumber}</span> ${escapeHtml(note.title) || 'بدون عنوان'}</h3><button class="icon-btn" id="close-view-modal">✕</button></div>
    <div class="modal-body">${note.content ? `<div class="view-content">${escapeHtml(note.content)}</div>` : ''}${imgsHtml}<div class="note-date">${formatDate(note.createdAt)}</div></div>
    <div class="modal-footer"><button class="btn-danger-ghost" id="delete-note-view-btn">حذف النوت</button><div class="footer-right"><button class="btn-ghost" id="close-view-btn">إغلاق</button><button class="btn-primary" id="edit-note-btn">✏️ تعديل</button></div></div>
  `);
  document.getElementById('close-view-modal').onclick = closeModal; document.getElementById('close-view-btn').onclick = closeModal;
  document.getElementById('edit-note-btn').onclick = ()=>openNoteEditModal(note); document.getElementById('delete-note-view-btn').onclick = ()=>confirmDeleteNote(note);
  document.querySelectorAll('.view-img').forEach(img=>{ img.addEventListener('click', ()=>openLightbox(img.dataset.src)); });
}

async function openNoteEditModal(note){
  await loadNotesForFolder(currentFolderId, true); renderMain(); editingNote = note || null; pendingImages = note ? JSON.parse(JSON.stringify(note.images||[])) : [];
  const folder = folders.find(f=>f.id===currentFolderId); const notes = notesByFolder[currentFolderId] || []; const noteNumber = note ? (notes.findIndex(n=>n.id===note.id)+1) : (notes.length+1);
  showModal(`
    <div class="modal-header"><h3>${note ? 'تعديل النوت' : 'نوت جديدة'}</h3><button class="icon-btn" id="close-note-modal">✕</button></div>
    <div class="modal-body">
      <div><label class="field-label">العنوان</label><input type="text" class="text-input" id="note-title-input" maxlength="120" value="${escapeHtml(note ? note.title : '')}"></div>
      <div><label class="field-label">المحتوى</label><textarea class="text-input" id="note-content-input">${escapeHtml(note ? note.content : '')}</textarea></div>
      <div><label class="field-label">الصور</label><label class="img-upload-btn">🖼️ إضافة صورة<input type="file" accept="image/*" multiple id="note-img-input" style="display:none"></label><div id="img-previews"></div></div>
    </div>
    <div class="modal-footer"><div>${note ? '<button class="btn-danger-ghost" id="delete-note-btn">حذف النوت</button>' : ''}</div><div class="footer-right"><button class="btn-ghost" id="cancel-note-btn">إلغاء</button><button class="btn-primary" id="save-note-btn">حفظ</button></div></div>
  `);
  renderImgPreviews(); document.getElementById('close-note-modal').onclick = closeModal; document.getElementById('cancel-note-btn').onclick = closeModal;
  document.getElementById('note-img-input').addEventListener('change', handleImageInput); document.getElementById('save-note-btn').onclick = saveNote;
  if(document.getElementById('delete-note-btn')) document.getElementById('delete-note-btn').onclick = ()=>confirmDeleteNote(note);
}

function renderImgPreviews(){
  const wrap = document.getElementById('img-previews'); if(!wrap) return;
  wrap.innerHTML = pendingImages.map((im,i)=>`<div class="img-preview"><img src="${im.data}"><button class="img-remove" data-i="${i}">✕</button></div>`).join('');
  wrap.querySelectorAll('.img-remove').forEach(btn=>{ btn.addEventListener('click', ()=>{ pendingImages.splice(parseInt(btn.dataset.i),1); renderImgPreviews(); }); });
}

async function handleImageInput(e){
  const files = Array.from(e.target.files || []); if(!files.length) return;
  showToast('جاري رفع الصور ومزامنتها...');
  for(const file of files){
    try{
      const publicUrl = await window.uploadFileToStorage(file);
      pendingImages.push({ id: uid('img'), data: publicUrl });
    }catch(err){ showToast('فشل في رفع أحد الصور'); }
  }
  renderImgPreviews(); e.target.value = '';
}

async function saveNote(){
  const title = document.getElementById('note-title-input').value.trim(); const content = document.getElementById('note-content-input').value.trim();
  if(!title && !content && pendingImages.length===0){ showToast('النوت فارغة'); return; }
  const notes = await sGet('app:notes:' + currentFolderId, true) || [];
  if(editingNote){
    const idx = notes.findIndex(n=>n.id===editingNote.id);
    if(idx > -1){ notes[idx] = { ...notes[idx], title, content, images: pendingImages, updatedAt: Date.now() }; }
  } else {
    notes.push({ id: uid('n'), title, content, images: pendingImages, createdAt: Date.now(), updatedAt: Date.now() });
  }
  notesByFolder[currentFolderId] = notes; await sSet('app:notes:' + currentFolderId, notes, true); closeModal(); renderSidebar(); renderMain(); showToast('تم الحفظ');
}

function confirmDeleteNote(note){
  showModal(`
    <div class="modal-header"><h3>🗑 حذف النوت</h3></div>
    <div class="modal-body"><div class="confirm-text">سيتم حذف النوت نهائياً من الموقع المشترك.</div></div>
    <div class="modal-footer"><button class="btn-ghost" id="cancel-del-note">إلغاء</button><button class="btn-danger-ghost" id="confirm-del-note">حذف نهائي</button></div>
  `);
  document.getElementById('cancel-del-note').onclick = closeModal;
  document.getElementById('confirm-del-note').onclick = async ()=>{
    const notes = await sGet('app:notes:' + currentFolderId, true) || []; const updated = notes.filter(n=>n.id !== note.id);
    notesByFolder[currentFolderId] = updated; await sSet('app:notes:' + currentFolderId, updated, true); closeModal(); renderSidebar(); renderMain(); showToast('تم الحذف');
  };
}

function showModal(innerHtml){ const root = document.getElementById('modal-root'); root.innerHTML = `<div class="overlay" id="modal-overlay"><div class="modal">${innerHtml}</div></div>`; document.getElementById('modal-overlay').addEventListener('mousedown', (e)=>{ if(e.target.id === 'modal-overlay') closeModal(); }); }
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; editingNote = null; pendingImages = []; }
function openLightbox(src){ const root = document.getElementById('modal-root'); const lb = document.createElement('div'); lb.className = 'lightbox'; lb.innerHTML = `<img src="${src}">`; lb.addEventListener('click', ()=>lb.remove()); root.appendChild(lb); }
document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape'){ const lb = document.querySelector('.lightbox'); if(lb){lb.remove(); return;} if(document.getElementById('modal-overlay')) closeModal(); } });

function openSidebarMobile(){ document.body.classList.add('sidebar-open'); }
function closeSidebarMobile(){ document.body.classList.remove('sidebar-open'); }

document.getElementById('refresh-folders-btn').addEventListener('click', async ()=>{ await refreshFolders(); await preloadAllCounts(); if(currentFolderId) await loadNotesForFolder(currentFolderId, true); renderSidebar(); renderMain(); showToast('تم التحديث'); });
document.getElementById('refresh-notes-btn').addEventListener('click', async ()=>{ if(!currentFolderId) return; await loadNotesForFolder(currentFolderId, true); renderMain(); showToast('تم التحديث'); });
document.getElementById('theme-toggle').addEventListener('click', async ()=>{ theme = theme === 'dark' ? 'light' : 'dark'; applyTheme(); await sSet('app:theme', theme, false, true); });
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, get as dbGet, set as dbSet, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// إعدادات الـ Firebase المشترك الخاصة بمشروعك
const firebaseConfig = {
  apiKey: "AIzaSyDFXCcd5HxZRRfH9lTSw_I8dHJO4rKvmNk",
  authDomain: "exam-notes-3ssam.firebaseapp.com",
  databaseURL: "https://exam-notes-3ssam-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "exam-notes-3ssam",
  storageBucket: "exam-notes-3ssam.firebasestorage.app",
  messagingSenderId: "901496869239",
  appId: "1:901496869239:web:6d816826e466cefa1d5172"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// مفتاح ImgBB الخاص بك والمربوط بحسابك مباشرة
const IMGBB_API_KEY = "6910c01e73136ff4c36332af28e39b44";

window.uploadFileToStorage = async function(file) {
  const formData = new FormData();
  formData.append("image", file);

  const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
    method: "POST",
    body: formData
  });

  if (!response.ok) throw new Error("ImgBB upload failed");
  const json = await response.json();
  
  if (json && json.data && json.data.url) {
    return json.data.url; // اللينك السريع والمباشر المولد من حسابك
  }
  throw new Error("Invalid ImgBB response");
};

window.storage = {
  async get(key, shared) {
    if (!shared) { const v = localStorage.getItem(key); return v ? { value: v } : null; }
    const snapshot = await dbGet(ref(db, 'kv_store/' + key.replace(/[\.#\$\[\]]/g, '_')));
    if (!snapshot.exists()) return null;
    return { value: JSON.stringify(snapshot.val()) };
  },
  async set(key, value, shared) {
    if (!shared) { localStorage.setItem(key, value); return; }
    const parsedValue = JSON.parse(value);
    await dbSet(ref(db, 'kv_store/' + key.replace(/[\.#\$\[\]]/g, '_')), parsedValue);
  },
  async delete(key, shared) {
    if (!shared) { localStorage.removeItem(key); return; }
    await remove(ref(db, 'kv_store/' + key.replace(/[\.#\$\[\]]/g, '_')));
  }
};

if (typeof init === 'function') init();
</script>
